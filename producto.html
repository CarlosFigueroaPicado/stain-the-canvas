<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Producto | Stain the Canvas</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="sticky-top">
      <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container">
          <a class="navbar-brand brand-title" href="index.html">Stain the Canvas</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#productNav"
            aria-controls="productNav"
            aria-expanded="false"
            aria-label="Alternar navegacion"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="productNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
              <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
              <li class="nav-item"><a class="nav-link" href="catalogo.html">Catalogo</a></li>
              </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="py-5">
      <section class="container">
        <a class="btn btn-outline-brand rounded-pill mb-4" href="catalogo.html">Volver al catalogo</a>

        <div id="productStatus" class="alert alert-brand-subtle" role="status">
          Cargando producto...
        </div>

        <article id="productDetailCard" class="product-detail-card d-none">
          <div class="row g-4 align-items-center">
            <div class="col-lg-6">
              <img id="productImage" class="img-fluid rounded-4 detail-image" src="" alt="Imagen del producto" />
            </div>
            <div class="col-lg-6">
              <p id="productCategory" class="small text-uppercase letter-space text-brand mb-2"></p>
              <h1 id="productName" class="display-5 mb-3"></h1>
              <p id="productPrice" class="fs-3 fw-semibold mb-3"></p>
              <p id="productDescription" class="mb-4"></p>
              <div class="d-flex flex-wrap gap-2">
                <a id="productWhatsapp" class="btn btn-brand btn-lg rounded-pill px-4" href="#" target="_blank" rel="noopener noreferrer">
                  Consultar por WhatsApp
                </a>
                <a id="productShare" class="btn btn-outline-brand btn-lg rounded-pill px-4" href="#">
                  Copiar enlace
                </a>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer class="py-4 border-top border-brand-subtle">
      <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
        <small>(c) 2026 Stain the Canvas</small>
        <small>Detalles de producto.</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/producto.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
