<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin | Stain the Canvas</title>

    <link rel="icon" type="image/jpeg" href="assets/bisuteria_2.jpg" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-main">
      <section class="login-shell" id="loginShell">
        <article class="login-card admin-card border-0">
          <div class="login-logo mb-2" aria-label="Logo Stain the Canvas">
            <span class="login-logo-mark login-relief">STC</span>
            <span class="brand-title login-logo-text login-relief">Stain the Canvas</span>
          </div>
          <h1 class="h2 mb-2 login-relief">Panel de administracion</h1>
          <p class="text-muted-brand mb-4 login-relief">Ingresa tus credenciales para gestionar productos.</p>

          <form id="adminLoginForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="loginUser">Correo admin</label>
              <input class="form-control" id="loginUser" type="email" autocomplete="username" required />
            </div>

            <div class="mb-3">
              <label class="form-label" for="loginPassword">Contrasena</label>
              <input
                class="form-control"
                id="loginPassword"
                type="password"
                autocomplete="current-password"
                required
              />
            </div>

            <button class="btn btn-brand rounded-pill px-4 w-100" type="submit">Entrar</button>
            <div id="loginStatus" class="alert alert-brand-subtle mt-3 d-none" role="status"></div>
          </form>
        </article>

        <div class="login-side-visual" aria-hidden="true">
          <p class="login-emblem login-motto-glow login-relief">"Donde la creatividad se transforma en arte hecho a mano, con elegancia en cada detalle."</p>
        </div>

        <button type="button" class="login-curtain" id="loginCurtain" aria-expanded="false">
          <div class="login-curtain-inner">
            <p class="text-uppercase small fw-semibold letter-space mb-2 login-relief">Stain the Canvas</p>
            <h2 class="display-6 mb-3 login-motto-glow login-relief">"Donde la creatividad se transforma en arte hecho a mano, con elegancia en cada detalle."</h2>
          </div>
        </button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
